[graph]
targets = []

[advisories]
# Check for security vulnerabilities
version = 2
ignore = []

[licenses]
version = 2
# Allow standard open source licenses used by our dependencies
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Unlicense",
]

[bans]
# Warn on duplicate crate versions (transitive dependency version conflicts)
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
